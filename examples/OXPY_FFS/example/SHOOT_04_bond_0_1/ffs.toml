# Shoot from Q=0, close but unbonded, towards Q=1, one bond formed.
input = "../input"
ncpus = 24

pairs = [
  [20, 71],
]

# Hybrid OP:
# Q is distance-based while no listed pair is bonded.
# If use_bonds = true and one or more listed pairs are bonded, Q = nbonds.
distance_thresholds =  [8, 5, 3, 2]
distance_final_state = 0

use_bonds = true
bond_threshold = -0.10

initial_seed = 52345
total_simulations = 200000

starting_conf_pattern = "../SHOOT_03_dist_m1_0/success_*.dat"

state_A = -4
interface = [0, 1]

[log]
filename = "ffs.log"
verbose = true
also_stderr = true
